<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Releases · Ashen Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
    <style>
        body { background: #0f0f1a; }
        .card-subtle { background: rgba(31, 41, 55, 0.6); border: 1px solid rgba(75, 85, 99, 0.3); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        .table-hover tr:hover { background: rgba(55, 65, 81, 0.5); }
        input, textarea { transition: all 0.2s ease; }
        input:focus, textarea:focus { box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3); }
        .upload-zone { transition: all 0.2s ease; }
        .upload-zone.drag-over { border-color: #6366f1; background: rgba(99, 102, 241, 0.1); }
    </style>
</head>
<body class="min-h-screen text-gray-100">

    <!-- Navigation -->
    <nav class="bg-gray-900/90 backdrop-blur-sm border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="index.html" class="flex items-center space-x-2 text-white font-bold text-lg">
                        <span class="inline-flex items-center justify-center w-8 h-8 bg-indigo-600 rounded-lg">
                            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </span>
                        <span>Ashen</span>
                    </a>
                    <div class="hidden md:flex space-x-1">
                        <a href="index.html" class="nav-link px-3 py-2 rounded-lg text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-800 transition-all">Dashboard</a>
                        <a href="releases.html" class="nav-link px-3 py-2 rounded-lg text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-800 transition-all">Releases</a>
                        <a href="accounts.html" class="nav-link px-3 py-2 rounded-lg text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-800 transition-all">Accounts</a>
                        <a href="migrations.html" class="nav-link px-3 py-2 rounded-lg text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-800 transition-all">Migrations</a>
                        <a href="db.html" class="nav-link px-3 py-2 rounded-lg text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-800 transition-all">Database</a>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="logout()" class="js-auth-show px-3 py-1.5 text-sm text-gray-400 hover:text-red-400 hover:bg-red-900/30 rounded-lg transition-all">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-fade-in">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold text-white">Releases</h1>
                <p class="text-gray-400 mt-1">Manage launcher and modpack versions.</p>
            </div>
            <div class="flex space-x-2">
                <button onclick="showUpload('launcher')" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium rounded-lg transition-all">+ Upload Launcher</button>
                <button onclick="showUpload('modpack')" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium rounded-lg transition-all">+ Upload Modpack</button>
            </div>
        </div>

        <!-- Launcher Releases -->
        <div class="card-subtle rounded-xl p-6 mb-6">
            <h2 class="text-lg font-semibold text-white mb-4">Launcher</h2>
            <div id="launcher-releases" class="overflow-x-auto">
                <div class="text-center py-8 text-gray-500">Loading releases…</div>
            </div>
        </div>

        <!-- Modpack Releases -->
        <div class="card-subtle rounded-xl p-6">
            <h2 class="text-lg font-semibold text-white mb-4">Modpack</h2>
            <div id="modpack-releases" class="overflow-x-auto">
                <div class="text-center py-8 text-gray-500">Loading releases…</div>
            </div>
        </div>
    </main>

    <!-- Upload Modal -->
    <div id="uploadModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4" onclick="closeUpload(event)">
        <div class="bg-gray-800 rounded-2xl w-full max-w-lg p-6 border border-gray-700 shadow-2xl" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-semibold text-white" id="modal-title">Upload Release</h3>
                <button onclick="closeUpload()" class="text-gray-400 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>

            <div id="upload-error" class="hidden bg-red-900/50 border border-red-700/50 text-red-300 px-4 py-3 rounded-lg text-sm mb-4"></div>

            <form id="upload-form" class="space-y-4">
                <input type="hidden" id="upload-type" value="launcher" />

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">Version</label>
                    <input type="text" id="upload-version" required pattern="[A-Za-z0-9._\-+]+"
                           placeholder="1.0.0" class="w-full px-4 py-2.5 bg-gray-700/50 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500" />
                    <p class="text-xs text-gray-500 mt-1">Letters, digits, and ._-+ only</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5" id="file-label">File</label>
                    <div class="upload-zone border-2 border-dashed border-gray-600 rounded-lg p-6 text-center hover:border-indigo-500 cursor-pointer" id="drop-zone">
                        <input type="file" id="upload-file" required class="hidden" />
                        <svg class="w-8 h-8 text-gray-500 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                        </svg>
                        <p class="text-sm text-gray-400" id="drop-text">Click or drag file here</p>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">Release Notes</label>
                    <textarea id="upload-notes" rows="4" placeholder="What's new?" class="w-full px-4 py-2.5 bg-gray-700/50 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500"></textarea>
                </div>

                <button type="submit" id="upload-btn" class="w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-lg transition-all disabled:opacity-50">
                    <span id="upload-btn-text">Publish</span>
                    <svg id="upload-spinner" class="hidden animate-spin h-5 w-5 mx-auto text-white" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            if (!App.requireAuth()) return;

            // ── Tab switch from index.html ──────────────────
            const params = new URLSearchParams(window.location.search);
            if (params.get('upload')) {
                showUpload(params.get('upload'));
            }

            // ── Load releases ───────────────────────────────
            async function loadReleases() {
                try {
                    const [launcherData, modpackData] = await Promise.all([
                        apiListLauncherReleases(),
                        apiListModpackReleases(),
                    ]);

                    renderTable('launcher-releases', launcherData?.releases || [], 'launcher');
                    renderTable('modpack-releases', modpackData?.releases || [], 'modpack');
                } catch (err) {
                    document.getElementById('launcher-releases').innerHTML =
                        '<div class="text-center py-8 text-red-400">Failed to load releases: ' + App.escapeHtml(err.message) + '</div>';
                    document.getElementById('modpack-releases').innerHTML =
                        '<div class="text-center py-8 text-red-400">Failed to load releases: ' + App.escapeHtml(err.message) + '</div>';
                }
            }

            function renderTable(containerId, releases, type) {
                const container = document.getElementById(containerId);
                if (!releases.length) {
                    container.innerHTML = '<p class="text-gray-500 py-4">No releases yet.</p>';
                    return;
                }

                const cfg = window.ASHEN_CONFIG || {};
                const fileName = type === 'launcher' ? (cfg.launcherFileName || 'AshenLauncher.exe') : (cfg.modpackFileName || 'modpack.zip');

                let html = `
                    <table class="w-full table-hover">
                        <thead>
                            <tr class="text-left text-xs text-gray-500 uppercase tracking-wider border-b border-gray-700">
                                <th class="pb-3 pr-4">Version</th>
                                <th class="pb-3 pr-4">Published</th>
                                <th class="pb-3 pr-4">SHA-256</th>
                                <th class="pb-3 pr-4">Latest</th>
                                <th class="pb-3 pr-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-700/50">
                `;

                releases.forEach(r => {
                    const sha = r.sha256 ? r.sha256.slice(0, 12) + '…' : '—';
                    html += `
                        <tr class="text-sm">
                            <td class="py-3 pr-4 font-mono text-gray-200">${App.escapeHtml(r.version)}</td>
                            <td class="py-3 pr-4 text-gray-400">${App.formatDate(r.published_at)}</td>
                            <td class="py-3 pr-4 font-mono text-gray-400 text-xs">${sha}</td>
                            <td class="py-3 pr-4">${r.is_latest ? '<span class="text-emerald-400">✓</span>' : ''}</td>
                            <td class="py-3 pr-4 flex space-x-2">
                                <a href="/api/files/${type}/${r.version}/${fileName}"
                                   class="text-indigo-400 hover:text-indigo-300 transition-colors" title="Download" download>
                                    ⬇ Download
                                </a>
                                <button onclick="deleteRelease('${type}', '${r.version}')"
                                        class="text-red-400 hover:text-red-300 transition-colors text-sm font-medium">Delete</button>
                            </td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                container.innerHTML = html;
            }

            // ── Delete release ──────────────────────────────
            window.deleteRelease = async function(type, version) {
                if (!confirm(`Delete ${type} version "${version}"? This cannot be undone.`)) return;

                try {
                    await apiDeleteRelease(type, version);
                    App.showToast(`${type} ${version} deleted`, 'success');
                    loadReleases();
                } catch (err) {
                    App.showToast(err.message || 'Failed to delete release', 'error');
                }
            };

            // ── Upload modal ────────────────────────────────
            window.showUpload = function(type) {
                document.getElementById('upload-type').value = type;
                document.getElementById('modal-title').textContent =
                    type === 'launcher' ? 'Upload Launcher' : 'Upload Modpack';
                document.getElementById('file-label').textContent =
                    type === 'launcher' ? 'AshenLauncher.exe' : 'modpack.zip';
                document.getElementById('upload-btn-text').textContent =
                    type === 'launcher' ? 'Publish Launcher' : 'Publish Modpack';
                document.getElementById('upload-error').classList.add('hidden');
                document.getElementById('upload-form').reset();
                document.getElementById('uploadModal').classList.remove('hidden');
                document.getElementById('uploadModal').classList.add('flex');
            };

            window.closeUpload = function(e) {
                if (e && e.target !== e.currentTarget) return;
                document.getElementById('uploadModal').classList.add('hidden');
                document.getElementById('uploadModal').classList.remove('flex');
            };

            // ── File upload drag & drop ─────────────────────
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('upload-file');
            const dropText = document.getElementById('drop-text');

            dropZone.addEventListener('click', () => fileInput.click());
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                if (e.dataTransfer.files.length) {
                    fileInput.files = e.dataTransfer.files;
                    dropText.textContent = e.dataTransfer.files[0].name;
                }
            });
            fileInput.addEventListener('change', () => {
                if (fileInput.files.length) {
                    dropText.textContent = fileInput.files[0].name;
                }
            });

            // ── Upload form submit ──────────────────────────
            document.getElementById('upload-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const type = document.getElementById('upload-type').value;
                const version = document.getElementById('upload-version').value.trim();
                const file = fileInput.files[0];
                const notes = document.getElementById('upload-notes').value.trim();

                const errorEl = document.getElementById('upload-error');

                if (!version) { showUploadError('Version is required.'); return; }
                if (!file) { showUploadError('Please select a file.'); return; }

                const btn = document.getElementById('upload-btn');
                btn.disabled = true;
                document.getElementById('upload-btn-text').classList.add('hidden');
                document.getElementById('upload-spinner').classList.remove('hidden');

                try {
                    await apiPublishRelease(type, version, file, notes);
                    App.showToast(`${type} ${version} published successfully!`, 'success');
                    closeUpload();
                    loadReleases();
                } catch (err) {
                    showUploadError(err.message || 'Upload failed');
                } finally {
                    btn.disabled = false;
                    document.getElementById('upload-btn-text').classList.remove('hidden');
                    document.getElementById('upload-spinner').classList.add('hidden');
                }
            });

            function showUploadError(msg) {
                const el = document.getElementById('upload-error');
                el.textContent = msg;
                el.classList.remove('hidden');
            }

            // ── Init ────────────────────────────────────────
            loadReleases();
        })();
    </script>
</body>
</html>
