# ── Ashen Studio Dashboard — nginx Configuration ─────────
# Serves static files and proxies /api/ to the FastAPI backend.

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster loads
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # ── Static files ────────────────────────────────────
    location / {
        try_files $uri $uri.html $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Cache JS/HTML config files briefly
    location ~* \.(js|css|html)$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── API proxy ───────────────────────────────────────
    # Forward /api/* requests to the FastAPI backend.
    # In Docker Compose this is the `ashenapi-api` service.
    location /api/ {
        proxy_pass http://ashenapi-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for large uploads (releases up to 1 GB)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 0;  # Disable body size check (handled by API)
    }

    # ── Security headers ────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Error pages ─────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
}
